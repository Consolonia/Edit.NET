name: Release Packaging & Publishing

on:
  workflow_run:
    workflows: ["General Build"]
    types:
      - completed
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - main
      - pre-main
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pull-requests: read

concurrency:
  group: release_packaging_publish-${{ github.event.workflow_run.head_branch || github.head_ref || github.ref }}
  cancel-in-progress: false

env:
  PROJECT_PATH: ./src/Edit.NET/Edit.NET.csproj
  ARTIFACTS_DIR: ./artifacts

jobs:
  evaluate_trigger:
    runs-on: ubuntu-latest
    outputs:
      should_package: ${{ steps.evaluate.outputs.should_package }}
      should_create_release: ${{ steps.evaluate.outputs.should_create_release }}
      should_publish_ecosystems: ${{ steps.evaluate.outputs.should_publish_ecosystems }}
    steps:
      - name: Evaluate trigger mode
        id: evaluate
        uses: actions/github-script@v7
        with:
          script: |
            const setOutputs = (shouldPackage, shouldCreateRelease, shouldPublishEcosystems) => {
              core.setOutput('should_package', shouldPackage ? 'true' : 'false');
              core.setOutput('should_create_release', shouldCreateRelease ? 'true' : 'false');
              core.setOutput('should_publish_ecosystems', shouldPublishEcosystems ? 'true' : 'false');
            };

            if (context.eventName === 'pull_request') {
              core.info('Direct PR debug mode detected. Running full packaging + release flow.');
              setOutputs(true, true, true);
              return;
            }

            if (context.eventName === 'workflow_dispatch') {
              core.info('Direct workflow_dispatch debug mode detected. Running full packaging + release flow.');
              setOutputs(true, true, true);
              return;
            }

            if (context.eventName !== 'workflow_run') {
              core.info(`Unsupported triggering event '${context.eventName}'. Packaging will be skipped.`);
              setOutputs(false, false, false);
              return;
            }

            const workflowRun = context.payload.workflow_run;

            if (workflowRun.conclusion !== 'success') {
              core.info('General Build did not complete successfully. Packaging will be skipped.');
              setOutputs(false, false, false);
              return;
            }

            const isOfficialRelease = workflowRun.event === 'workflow_dispatch' && workflowRun.head_branch === 'main';
            if (isOfficialRelease) {
              core.info('Official release mode detected.');
              setOutputs(true, true, true);
              return;
            }

            if (workflowRun.event === 'pull_request') {
              core.info('Skipping PR workflow_run mode because direct pull_request trigger handles PR debugging.');
              setOutputs(false, false, false);
              return;
            }

            core.info(`Unsupported workflow_run source event '${workflowRun.event}'. Packaging will be skipped.`);
            setOutputs(false, false, false);

  package_and_release:
    if: ${{ needs.evaluate_trigger.outputs.should_package == 'true' }}
    needs: evaluate_trigger
    outputs:
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      release_version: ${{ steps.release_meta.outputs.release_version }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Load .env
        uses: c-py/action-dotenv-to-setenv@v5

      - name: Download release metadata from General Build
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: release-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./release-metadata

      - name: Load release metadata
        if: ${{ github.event_name == 'workflow_run' }}
        id: release_meta
        run: |
          set -euo pipefail
          REQUIRED_FILES="build_version consolonia_version release_version release_tag commit_sha"
          for FILE in $REQUIRED_FILES; do
            if [ ! -s "./release-metadata/$FILE" ]; then
              echo "Missing required metadata file: ./release-metadata/$FILE" >&2
              exit 1
            fi
          done

          BUILD_VERSION=$(tr -d '\r\n' < ./release-metadata/build_version)
          ConsoloniaVersion=$(tr -d '\r\n' < ./release-metadata/consolonia_version)
          RELEASE_VERSION=$(tr -d '\r\n' < ./release-metadata/release_version)
          RELEASE_TAG=$(tr -d '\r\n' < ./release-metadata/release_tag)
          COMMIT_SHA=$(tr -d '\r\n' < ./release-metadata/commit_sha)

          if [ "$COMMIT_SHA" != "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "Metadata commit SHA ($COMMIT_SHA) does not match workflow_run head SHA (${{ github.event.workflow_run.head_sha }})." >&2
            exit 1
          fi

          if [ "${{ github.event.workflow_run.event }}" = "workflow_dispatch" ] && [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            git fetch --tags --force
            if ! git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
              echo "Expected release tag '$RELEASE_TAG' not found. Ensure General Build created and pushed tags." >&2
              exit 1
            fi
          else
            echo "Skipping strict tag validation for non-official workflow_run mode."
          fi

          echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV
          echo "ConsoloniaVersion=$ConsoloniaVersion" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Release tag: $RELEASE_TAG"
          echo "Release version: $RELEASE_VERSION"

      - name: Prepare release metadata for direct runs
        if: ${{ github.event_name != 'workflow_run' }}
        id: release_meta_direct
        run: |
          set -euo pipefail

          BUILD_VERSION="${BUILD_VERSION:-${{ github.run_number }}}"
          ConsoloniaVersion=$(grep -oP '(?<=<ConsoloniaVersion Condition=".*">).*?(?=</ConsoloniaVersion>)' ./Directory.Build.props || grep -oP '(?<=<ConsoloniaVersion>).*?(?=</ConsoloniaVersion>)' ./Directory.Build.props)
          VERSION_LITERAL=$(grep -oP '(?<=<VersionPrefix>).*?(?=</VersionPrefix>)' ./Directory.Build.props)
          RELEASE_VERSION=$(echo "$VERSION_LITERAL" | sed "s/\\\$(ConsoloniaVersion)/$ConsoloniaVersion/g" | sed "s/\\\$(BUILD_VERSION)/$BUILD_VERSION/g")

          if [ -z "$RELEASE_VERSION" ]; then
            echo "Failed to determine release version from Directory.Build.props" >&2
            exit 1
          fi

          RELEASE_TAG="v$RELEASE_VERSION"

          {
            echo "BUILD_VERSION=$BUILD_VERSION"
            echo "ConsoloniaVersion=$ConsoloniaVersion"
            echo "RELEASE_TAG=$RELEASE_TAG"
            echo "RELEASE_VERSION=$RELEASE_VERSION"
          } >> "$GITHUB_ENV"

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Release tag: $RELEASE_TAG"
          echo "Release version: $RELEASE_VERSION"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.WORKFLOW_DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore "$PROJECT_PATH" /p:Configuration=Release

      - name: Install packaging tools
        run: |
          dotnet tool install --global DotnetPackaging.Tool
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Publish binaries for package formats
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACTS_DIR/publish/linux-x64" "$ARTIFACTS_DIR/publish/win-x64" "$ARTIFACTS_DIR/publish/osx-x64"

          dotnet publish "$PROJECT_PATH" --configuration release --runtime linux-x64 --self-contained true --no-restore --output "$ARTIFACTS_DIR/publish/linux-x64"
          dotnet publish "$PROJECT_PATH" --configuration release --runtime win-x64 --self-contained true --no-restore --output "$ARTIFACTS_DIR/publish/win-x64"
          dotnet publish "$PROJECT_PATH" --configuration release --runtime osx-x64 --self-contained true --no-restore --output "$ARTIFACTS_DIR/publish/osx-x64"

      - name: Build release packages
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACTS_DIR"

          ICON_PATH="./Icon.png"
          if [ ! -f "$ICON_PATH" ]; then
            echo "Expected icon file '$ICON_PATH' was not found." >&2
            exit 1
          fi

          dotnetpackager appimage from-directory --directory "$ARTIFACTS_DIR/publish/linux-x64" --icon "$ICON_PATH" --output "$ARTIFACTS_DIR/Edit.NET-${RELEASE_VERSION}-linux-x64.AppImage"
          dotnetpackager deb from-directory --directory "$ARTIFACTS_DIR/publish/linux-x64" --icon "$ICON_PATH" --output "$ARTIFACTS_DIR/Edit.NET_${RELEASE_VERSION}_amd64.deb"
          dotnetpackager rpm from-directory --directory "$ARTIFACTS_DIR/publish/linux-x64" --icon "$ICON_PATH" --output "$ARTIFACTS_DIR/Edit.NET-${RELEASE_VERSION}-1.x86_64.rpm"
          dotnetpackager dmg from-directory --directory "$ARTIFACTS_DIR/publish/osx-x64" --icon "$ICON_PATH" --output "$ARTIFACTS_DIR/Edit.NET-${RELEASE_VERSION}.dmg"
          dotnetpackager msix from-directory --directory "$ARTIFACTS_DIR/publish/win-x64" --icon "$ICON_PATH" --output "$ARTIFACTS_DIR/Edit.NET-${RELEASE_VERSION}.msix"
          dotnetpackager exe from-directory --directory "$ARTIFACTS_DIR/publish/win-x64" --icon "$ICON_PATH" --arch x64 --output "$ARTIFACTS_DIR/Edit.NET-${RELEASE_VERSION}-win-x64.exe"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-${{ env.RELEASE_TAG }}
          path: |
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.dmg
            artifacts/*.msix
            artifacts/*.exe
          if-no-files-found: error

      - name: Create or update GitHub release
        if: ${{ needs.evaluate_trigger.outputs.should_create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.event.workflow_run.head_sha || github.event.pull_request.head.sha || github.sha }}
          prerelease: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request') }}
          generate_release_notes: true
          files: |
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.dmg
            artifacts/*.msix
            artifacts/*.exe

