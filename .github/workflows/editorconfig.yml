name: Code Inspections

concurrency:
  group: style_checks_deploy-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
      - pre-main

permissions:
  contents: write
  pull-requests: write

jobs:  
  inspection:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # from https://github.com/marketplace/actions/dotnet-format
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          persist-credentials: false

      - name: Load .env
        uses: c-py/action-dotenv-to-setenv@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.WORKFLOW_DOTNET_VERSION || '8.0' }}
          
      - name: Restore
        run: dotnet restore
        working-directory: ./src
        
      - name: install-resharper
        run: |
          dotnet tool install --global JetBrains.ReSharper.GlobalTools --version 2025.2.1
        continue-on-error: true # todo: need to check whether has changes

      - name: resharper-cleanup
        run: |                    
          jb cleanupcode ${{ env.SOLUTION_NAME }} --exclude="**Consolonia.GuiCS/**.*"
        working-directory: ./src

      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git diff > cleanup.patch
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            touch cleanup.patch
          fi

      - name: Inspect code
        uses: muno92/resharper_inspectcode@1.12.0
        with:
          solutionPath: ./src/${{ env.SOLUTION_NAME }}
          exclude: "**Consolonia.GuiCS/**.*;**Consolonia.Gallery/**.*"
          version: '2025.2.1'
          minimumSeverity: 'warning'

      - name: Save Metadata
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          USER_LOGIN: ${{ github.event.pull_request.user.login }}
          USER_ID: ${{ github.event.pull_request.user.id }}
        run: |
          mkdir -p metadata
          echo "$PR_NUMBER" > metadata/pr_number
          echo "$HEAD_REPO" > metadata/head_repo
          echo "$HEAD_REF" > metadata/head_ref
          echo "$HEAD_SHA" > metadata/head_sha
          echo "$USER_LOGIN" > metadata/user_login
          echo "$USER_ID" > metadata/user_id

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-artifacts
          path: |
            cleanup.patch
            metadata/

  dupfinder:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          persist-credentials: false

      - name: Load .env
        uses: c-py/action-dotenv-to-setenv@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.WORKFLOW_DOTNET_VERSION || '8.0' }}

      - name: Restore
        run: dotnet restore
        working-directory: ./src

      - name: Install JetBrains ReSharper GlobalTools (dupfinder 2021.2.3)
        run: dotnet tool install -g JetBrains.ReSharper.GlobalTools --version 2021.2.3

      - name: Run dupfinder (duplicate code check, produce XML)
        run: |
          ~/.dotnet/tools/jb dupfinder ${{ env.SOLUTION_NAME }} --exclude-code-regions='DUPFINDER_ignore' --exclude-by-comment='DUPFINDER_ignore' --output=dupfinder-report.xml --discard-cost=100
        working-directory: ./src

      - name: Upload dupfinder XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dupfinder-report-${{ github.run_number }}
          path: ./src/dupfinder-report.xml
          if-no-files-found: error

      - name: Print dupfinder XML report to log
        if: always()
        run: |
          echo "::group::dupfinder-report.xml"
          cat dupfinder-report.xml
          echo "::endgroup::"
        working-directory: ./src

      - name: Fail if duplicates found
        run: |
          if grep -Eq "<Duplicate( |>)" dupfinder-report.xml; then
            echo "Duplicate code detected by dupfinder. See the uploaded artifact: dupfinder-report-${{ github.run_number }}";
            exit 1;
          else
            echo "No duplicate code detected by dupfinder.";
          fi
        working-directory: ./src