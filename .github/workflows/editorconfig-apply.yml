name: Apply Code Cleanup

on:
  workflow_run:
    workflows: ["Code Inspections"]
    types:
      - completed

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      statuses: write
      checks: write
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: cleanup-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: cleanup-artifacts

      - name: Check for cleanup patch
        id: check-patch
        run: |
          if [ -s "cleanup-artifacts/cleanup.patch" ]; then
            echo "has_patch=true" >> $GITHUB_OUTPUT
          else
            echo "has_patch=false" >> $GITHUB_OUTPUT
          fi

      - name: Read metadata
        id: metadata
        run: |
          for file in pr_number head_repo head_ref head_sha user_login user_id; do
            if [ -f "cleanup-artifacts/metadata/$file" ]; then
              echo "$file<<EOF" >> "$GITHUB_OUTPUT"
              cat "cleanup-artifacts/metadata/$file" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Apply patch
        if: steps.check-patch.outputs.has_patch == 'true'
        run: |
          git apply cleanup-artifacts/cleanup.patch

      - name: Commit and push
        if: steps.check-patch.outputs.has_patch == 'true'
        env:
          HEAD_REF: ${{ steps.metadata.outputs.head_ref }}
          USER_LOGIN: ${{ steps.metadata.outputs.user_login }}
          USER_ID: ${{ steps.metadata.outputs.user_id }}
        run: |
          # Validate input to prevent shell injection
          if [[ ! "$HEAD_REF" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "Error: Invalid head_ref '$HEAD_REF'"
            exit 1
          fi
          if [[ ! "$USER_LOGIN" =~ ^[A-Za-z0-9-]+$ ]]; then
            echo "Error: Invalid user_login '$USER_LOGIN'"
            exit 1
          fi
          if [[ ! "$USER_ID" =~ ^[0-9]+$ ]]; then
            echo "Error: Invalid user_id '$USER_ID'"
            exit 1
          fi

          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -a -m "Automated JetBrains cleanup
          
          Co-authored-by: $USER_LOGIN <$USER_ID+$USER_LOGIN@users.noreply.github.com>"
          git push origin "HEAD:$HEAD_REF"

      - name: Report commit status
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const jobStatus = '${{ job.status }}';
            const state = jobStatus === 'success' ? 'success' : 'failure';
            const head_sha = '${{ steps.metadata.outputs.head_sha }}' || '${{ github.event.workflow_run.head_sha }}';
            const description = jobStatus === 'success' 
                ? ('${{ steps.check-patch.outputs.has_patch }}' === 'true' ? 'Cleanup applied and pushed' : 'No cleanup needed')
                : 'Cleanup failed or was cancelled';

            console.log(`Reporting status to SHA: ${head_sha}`);

            // Report Commit Status
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: head_sha,
              state: state,
              context: 'Apply Code Cleanup',
              description: description,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

            // Report Check Run
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Apply Code Cleanup',
              head_sha: head_sha,
              status: 'completed',
              conclusion: state === 'success' ? 'success' : 'failure',
              output: {
                title: 'Code Cleanup Report',
                summary: description
              },
              details_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
