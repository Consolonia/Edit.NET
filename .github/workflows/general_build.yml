name: General Build

concurrency:
  group: build_checks_deploy-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      push_packages:
        description: 'Whether to push packages to NuGet'
        required: false
        default: 'false'
        type: string
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - main
      - pre-main

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IS_RELEASE_PUBLISH: ${{ (github.event_name == 'workflow_dispatch' || github.event.inputs.push_packages == 'true') && github.ref == 'refs/heads/main' }}
    defaults:
      run:
        working-directory: ./src

    steps:
      - uses: actions/checkout@v4

      - name: Load .env
        uses: c-py/action-dotenv-to-setenv@v5

      - name: Alpha Version Suffix
        if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' && contains(github.event.pull_request.labels.*.name, 'publish alpha') }}
        run: echo "VERSION_SUFFIX=alpha.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Ensure BUILD_VERSION
        run: |
          if [ -z "$BUILD_VERSION" ]; then
            echo "BUILD_VERSION=${{ github.run_number }}" >> $GITHUB_ENV
            echo "BUILD_VERSION was not set, using github.run_number: ${{ github.run_number }}"
          else
            echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV
            echo "BUILD_VERSION is already set: $BUILD_VERSION"
          fi
            
          VAL=$(grep -oP '(?<=<ConsoloniaVersion Condition=".*">).*?(?=</ConsoloniaVersion>)' ../Directory.Build.props || grep -oP '(?<=<ConsoloniaVersion>).*?(?=</ConsoloniaVersion>)' ../Directory.Build.props)
          echo "ConsoloniaVersion=$VAL" >> $GITHUB_ENV
          echo "ConsoloniaVersion detected: $VAL"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.WORKFLOW_DOTNET_VERSION || '8.0' }}
      - name: Restore dependencies
        run: dotnet restore /p:Configuration=Release
      - name: Build
        run: dotnet build --no-restore --configuration release
      - name: Test
        run: dotnet test # --configuration release todo: release get stuck and never finishes
      - name: Pack
        run: |
          VERSION_SUFFIX_ARG=""
          if [ -n "$VERSION_SUFFIX" ]; then
            VERSION_SUFFIX_ARG="--version-suffix $VERSION_SUFFIX"
          fi
          dotnet pack --configuration release -o ./packages -p:ContinuousIntegrationBuild=true $VERSION_SUFFIX_ARG
      - name: Push
        if: ${{ env.IS_RELEASE_PUBLISH == 'true' || env.VERSION_SUFFIX != '' }}
        run: dotnet nuget push **/*.nupkg --api-key ${{ secrets.NUGET_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Prepare release metadata
        if: ${{ env.IS_RELEASE_PUBLISH == 'true' }}
        run: |
          set -euo pipefail
          VERSION_LITERAL=$(grep -oP '(?<=<VersionPrefix>).*?(?=</VersionPrefix>)' ../Directory.Build.props)
          VERSION=$(echo "$VERSION_LITERAL" | sed "s/\\\$(ConsoloniaVersion)/$ConsoloniaVersion/g" | sed "s/\\\$(BUILD_VERSION)/$BUILD_VERSION/g")

          if [ -z "$VERSION" ]; then
            echo "Failed to determine version from ../Directory.Build.props" >&2
            exit 1
          fi

          RELEASE_TAG="v$VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

          mkdir -p ./release-metadata
          echo "$BUILD_VERSION" > ./release-metadata/build_version
          echo "$ConsoloniaVersion" > ./release-metadata/consolonia_version
          echo "$VERSION" > ./release-metadata/release_version
          echo "$RELEASE_TAG" > ./release-metadata/release_tag
          echo "${{ github.sha }}" > ./release-metadata/commit_sha

          echo "Prepared release metadata for tag: $RELEASE_TAG"
        
        # tagging the commit so we can track exact version when issues reported
      - name: Tag commit with version (post-publish)
        if: ${{ env.IS_RELEASE_PUBLISH == 'true' }}
        run: |
          set -e
          git fetch --tags

          echo "Version detected: $VERSION"
          echo "BUILD_VERSION: $BUILD_VERSION"
          echo "ConsoloniaVersion: $ConsoloniaVersion"
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Tag with full version
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists."
          else
            git tag "$RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi
          
          # Tag with BUILD_VERSION only
          if git rev-parse "$BUILD_VERSION" >/dev/null 2>&1; then
            echo "Tag $BUILD_VERSION already exists."
          else
            git tag "$BUILD_VERSION"
            git push origin "$BUILD_VERSION"
          fi

      - name: Upload release metadata artifact
        if: ${{ env.IS_RELEASE_PUBLISH == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: ./src/release-metadata/
          if-no-files-found: error
